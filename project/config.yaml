api:
  host: "0.0.0.0"
  port: 8000

model:
  type: "lightgbm" # options: logistic, random_forest, lightgbm
  path: "models/best_model.joblib"

thresholds:
  do_night_min: 5.0 # mg/L
  ammonia_max: 0.5 # mg/L
  nitrite_max: 0.2 # mg/L
  mortality_max: 0.05 # proportion
  stress_max: 0.3 # arbitrary units

training:
  test_size: 0.2
  random_state: 42
  recall_weight: 2.0

required_columns: []

